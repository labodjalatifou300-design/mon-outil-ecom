## 📸 Visuellement ça ressemble à ça :
```
[ .streamlit/config.toml    ]  ← tu tapes ça dans la case nom
```

Dès que tu tapes le `/`, GitHub crée automatiquement le dossier. Tu n'as pas besoin de créer le dossier séparément.

Après ça, ton repo aura :
```
ton-repo/
├── app.py
└── .streamlit/
    └── config.toml   ✅
